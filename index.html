<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sim</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; }
        canvas { display: block; cursor: crosshair; }
        
        #ui-panel {
            position: absolute; top: 0; right: 0; width: 280px; height: 100%;
            background: rgba(10, 10, 20, 0.95); border-left: 2px solid #334155;
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5); z-index: 10;
        }
        
        h1 { margin: 0 0 5px 0; font-size: 1.5rem; color: #facc15; text-transform: uppercase; }
        p.subtitle { margin: 0 0 20px 0; font-size: 0.85rem; color: #94a3b8; }
        
        h2 { margin: 10px 0; font-size: 0.9rem; color: #cbd5e1; border-bottom: 1px solid #475569; padding-bottom: 5px; text-transform: uppercase; }
        
        .body-btn {
            background: #1e293b; border: 2px solid #334155; color: white;
            padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px; transition: 0.2s;
            text-align: left;
        }
        .body-btn:hover { background: #334155; }
        .body-btn.active { border-color: #facc15; background: rgba(250, 204, 21, 0.1); }
        
        .color-circle { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }

        .slider-container { margin: 15px 0; background: #1e293b; padding: 10px; border-radius: 6px; border: 1px solid #334155; }
        input[type="range"] { width: 100%; margin-top: 5px; accent-color: #facc15; }

        .control-btn { background: #ef4444; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: auto; text-transform: uppercase; }
        .control-btn:hover { background: #dc2626; }
        
        #instructions { 
            position: absolute; bottom: 20px; left: 20px; color: rgba(255,255,255,0.7); 
            pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1>Cosmic Forge</h1>
        <p class="subtitle">Click & drag to launch. Objects attract each other.</p>
        
        <h2>Spawn Body</h2>
        <div id="body-palette">
            </div>

        <div class="slider-container">
            <label for="initial-vel" style="font-size: 0.9rem; color: #cbd5e1;">Initial Velocity: <span id="vel-val">2</span>x</label>
            <input type="range" id="initial-vel" min="0.1" max="5" step="0.1" value="2">
        </div>

        <button class="control-btn" onclick="clearWorld()">🗑️ Clear Universe</button>
    </div>
    
    <div id="instructions">
        <b>Click & Drag</b> to launch planets/moons/asteroids.<br>
        <b>Click</b> to place static Stars/Black Holes.
    </div>
    <canvas id="nbody-canvas"></canvas>

    <script>
        const canvas = document.getElementById('nbody-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let width, height;
        let bodies = [];
        let G = 0.5; // Gravitational Constant (adjust for faster/slower gravity)

        // UI state
        let currentBodyType = 'Planet';
        let initialVelocityMultiplier = 2;
        let mouseDown = false;
        let startX, startY;

        // --- 1. BODY DEFINITIONS ---
        const BODY_TYPES = {
            'Star': {
                mass: 1000, size: 20, color: '#facc15', static: true, trail: false
            },
            'Planet': {
                mass: 5, size: 8, color: '#38bdf8', static: false, trail: true
            },
            'Moon': {
                mass: 0.5, size: 4, color: '#e2e8f0', static: false, trail: true
            },
            'Black Hole': {
                mass: 5000, size: 15, color: '#1e293b', static: true, trail: false
            },
            'Asteroid': {
                mass: 0.1, size: 2, color: '#888', static: false, trail: true
            }
        };

        // UI Setup
        const bodyPalette = document.getElementById('body-palette');
        Object.keys(BODY_TYPES).forEach(key => {
            const body = BODY_TYPES[key];
            const btn = document.createElement('button');
            btn.className = `body-btn ${key === currentBodyType ? 'active' : ''}`;
            btn.innerHTML = `<div class="color-circle" style="background:${body.color}"></div><span>${key}</span>`;
            if (key === 'Black Hole') btn.innerHTML = `<div class="color-circle" style="background:${body.color}; border-radius:0;"></div><span>${key}</span>`; // Different shape for BH
            btn.onclick = () => {
                currentBodyType = key;
                document.querySelectorAll('.body-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            bodyPalette.appendChild(btn);
        });

        document.getElementById('initial-vel').addEventListener('input', (e) => {
            initialVelocityMultiplier = parseFloat(e.target.value);
            document.getElementById('vel-val').innerText = initialVelocityMultiplier.toFixed(1);
        });

        // --- 2. THE BODY CLASS ---
        class Body {
            constructor(x, y, type) {
                const props = BODY_TYPES[type];
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.mass = props.mass;
                this.size = props.size;
                this.color = props.color;
                this.static = props.static; // Stars and Black Holes don't move
                this.trail = props.trail;
                this.type = type; // Store type for black hole check

                this.history = []; // For drawing trails
                this.dead = false; // For removal after collision/black hole
            }

            // Apply gravitational force from another body
            applyForce(other) {
                if (this.static) return; // Static bodies don't get pushed

                const dx = other.x - this.x;
                const dy = other.y - this.y;
                const distSq = dx * dx + dy * dy;
                const dist = Math.sqrt(distSq);

                // Prevent super-strong forces at zero distance
                if (dist < 1) return;

                const force = (G * this.mass * other.mass) / distSq;
                const angle = Math.atan2(dy, dx);

                this.vx += (Math.cos(angle) * force) / this.mass;
                this.vy += (Math.sin(angle) * force) / this.mass;
            }

            update() {
                if (this.static) return;

                this.x += this.vx;
                this.y += this.vy;

                // Keep trail history limited
                if (this.trail) {
                    this.history.push({ x: this.x, y: this.y });
                    if (this.history.length > 50) this.history.shift();
                }
            }

            draw() {
                // Draw trail first
                if (this.trail && this.history.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let i = 1; i < this.history.length; i++) {
                        ctx.lineTo(this.history[i].x, this.history[i].y);
                    }
                    ctx.strokeStyle = this.color + '44'; // Faint trail
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Draw body
                ctx.beginPath();
                if (this.type === 'Black Hole') {
                    // Draw a dark disk with a "swirl" effect
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = this.size * 0.8;
                    ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Event horizon (subtle inner ring)
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(50,50,50,0.8)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color + '88';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        // --- 3. GAME LOGIC & CONTROLS ---
        function initCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function clearWorld() {
            bodies = [];
        }

        // Mouse interaction for spawning bodies
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            startX = e.clientX;
            startY = e.clientY;

            // If it's a static body, place it directly on click
            if (BODY_TYPES[currentBodyType].static) {
                bodies.push(new Body(startX, startY, currentBodyType));
                mouseDown = false; // Don't drag static bodies
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!mouseDown || BODY_TYPES[currentBodyType].static) return; // Already handled static placement

            const endX = e.clientX;
            const endY = e.clientY;

            const dx = endX - startX;
            const dy = endY - startY;

            const newBody = new Body(startX, startY, currentBodyType);
            newBody.vx = dx * 0.05 * initialVelocityMultiplier; // Adjust velocity scale
            newBody.vy = dy * 0.05 * initialVelocityMultiplier;
            bodies.push(newBody);

            mouseDown = false;
        });

        // --- 4. THE SIMULATION LOOP ---
        function animate() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // If mouse is down and not a static body, draw a "launch vector"
            if (mouseDown && !BODY_TYPES[currentBodyType].static) {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = BODY_TYPES[currentBodyType].color + 'aa';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw predicted initial position of the body
                ctx.beginPath();
                ctx.arc(startX, startY, BODY_TYPES[currentBodyType].size, 0, Math.PI * 2);
                ctx.fillStyle = BODY_TYPES[currentBodyType].color + 'aa';
                ctx.fill();
            }

            // Calculate forces and update positions
            for (let i = 0; i < bodies.length; i++) {
                for (let j = 0; j < bodies.length; j++) {
                    if (i === j) continue;
                    bodies[i].applyForce(bodies[j]);
                }
            }

            // Update and draw bodies
            let newBodies = [];
            for (let i = 0; i < bodies.length; i++) {
                let body = bodies[i];
                if (body.dead) continue; // Skip dead bodies

                body.update();
                body.draw();
                newBodies.push(body);
            }
            bodies = newBodies; // Remove dead bodies

            // Collision detection
            for (let i = bodies.length - 1; i >= 0; i--) {
                for (let j = i - 1; j >= 0; j--) { // Check against already processed bodies
                    const b1 = bodies[i];
                    const b2 = bodies[j];

                    if (b1.dead || b2.dead) continue; // Skip if already marked for removal

                    const dx = b1.x - b2.x;
                    const dy = b1.y - b2.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < b1.size + b2.size) { // Collision!
                        if (b1.type === 'Black Hole' || b2.type === 'Black Hole') {
                            // Black hole consumes the other body
                            const bh = b1.type === 'Black Hole' ? b1 : b2;
                            const victim = bh === b1 ? b2 : b1;
                            
                            // Visual effect for consumption
                            createParticles(victim.x, victim.y, victim.color, 15);
                            victim.dead = true;
                            // Black hole grows slightly
                            bh.mass += victim.mass * 0.5; // Only absorb some mass
                            bh.size += victim.size * 0.1; // Grow size a bit
                            
                        } else {
                            // Inelastic collision for regular bodies
                            const larger = b1.mass > b2.mass ? b1 : b2;
                            const smaller = b1.mass > b2.mass ? b2 : b1;

                            createParticles(smaller.x, smaller.y, smaller.color, 10);
                            smaller.dead = true; // Mark for removal

                            // Larger body absorbs mass and momentum
                            larger.mass += smaller.mass * 0.5; // Only absorb some mass
                            larger.size += smaller.size * 0.2; // Grow size a bit
                            
                            // Merge velocities (simple average)
                            larger.vx = (larger.vx * larger.mass + smaller.vx * smaller.mass) / (larger.mass + smaller.mass);
                            larger.vy = (larger.vy * larger.mass + smaller.vy * smaller.mass) / (larger.mass + smaller.mass);
                        }
                    }
                }
            }

            // Remove dead bodies for next frame
            bodies = bodies.filter(b => !b.dead);

            // Particle effects
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });

            requestAnimationFrame(animate);
        }

        // --- PARTICLE EFFECTS (for collisions/black holes) ---
        let particles = [];
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random() - 0.5) * 6; this.vy = (Math.random() - 0.5) * 6;
                this.life = 30; this.maxLife = 30;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life--; }
            draw() {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, 3, 3);
                ctx.globalAlpha = 1.0;
            }
        }
        function createParticles(x, y, color, amount = 8) {
            for(let i=0; i<amount; i++) particles.push(new Particle(x, y, color));
        }

        // --- EVENT LISTENERS ---
        let mouseX = 0, mouseY = 0;
        canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('resize', () => { initCanvas(); });

        // Initial setup and start
        initCanvas();
        animate();

        // Spawn some initial elements for fun
        bodies.push(new Body(width / 2, height / 2, 'Star')); // Central Star
        // bodies.push(new Body(width / 4, height / 2, 'Black Hole')); // A black hole for chaos
        // bodies.push(new Body(width * 0.75, height / 2, 'Star')); // A binary partner
    </script>
</body>
</html>
