<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sim</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* UI Panel */
        #ui-panel {
            position: absolute; top: 0; left: 0; width: 320px; height: 100%;
            background: rgba(15, 23, 42, 0.95); color: white; padding: 20px;
            box-sizing: border-box; border-right: 3px solid #334155;
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }
        
        h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }
        h2 { margin: 0; font-size: 1rem; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; display: flex; justify-content: space-between; color: #cbd5e1; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        
        .material-btn {
            background: #1e293b; border: 2px solid #334155; color: white;
            padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
        }
        .material-btn:hover { background: #334155; }
        .material-btn.active { border-color: #38bdf8; background: rgba(56, 189, 248, 0.2); }
        
        .action-btn {
            background: #4ade80; color: #064e3b; border: none; padding: 15px;
            font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; margin-top: 10px;
        }
        .action-btn:hover { background: #22c55e; transform: translateY(-2px); }
        .action-btn.stop { background: #ef4444; color: white; }
        .action-btn.stop:hover { background: #dc2626; }
        .action-btn.clear { background: #64748b; color: white; padding: 10px; font-size: 0.9rem;}
        
        #status { font-size: 1.2rem; font-weight: bold; color: #fbbf24; text-align: center; padding: 10px; border: 2px dashed #fbbf24; border-radius: 6px; }
        
        /* Custom Canvas for Drawing Connections */
        #draw-canvas { position: absolute; top: 0; left: 320px; pointer-events: none; z-index: 10; }
        #matter-container { position: absolute; top: 0; left: 320px; width: calc(100% - 320px); height: 100%; cursor: crosshair; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h1>Bridge Builder</h1>
        <div id="status">MODE: BUILDING</div>
        
        <h2>Materials</h2>
        <div class="control-group">
            <button class="material-btn active" onclick="setMaterial('wood', this)">
                <span>🪵 Wood</span> <span style="font-size:0.7rem; color:#94a3b8;">Medium</span>
            </button>
            <button class="material-btn" onclick="setMaterial('steel', this)">
                <span>⚙️ Steel</span> <span style="font-size:0.7rem; color:#94a3b8;">Strong</span>
            </button>
            <button class="material-btn" onclick="setMaterial('cable', this)">
                <span>🧵 Cable</span> <span style="font-size:0.7rem; color:#94a3b8;">Flexible</span>
            </button>
        </div>

        <h2>Physics Settings</h2>
        <div class="control-group">
            <label>Gravity <span id="grav-val">1.0</span></label>
            <input type="range" id="gravity" min="0.1" max="3" step="0.1" value="1.0" oninput="updateSettings()">
            
            <label>Car Weight <span id="car-val">500</span></label>
            <input type="range" id="car-weight" min="100" max="2000" step="100" value="500" oninput="updateSettings()">
            
            <label>Car Speed <span id="speed-val">3</span></label>
            <input type="range" id="car-speed" min="1" max="8" step="0.5" value="3" oninput="updateSettings()">
            
            <label>Joint Mass (Bridge Weight) <span id="joint-val">10</span></label>
            <input type="range" id="joint-mass" min="1" max="50" step="1" value="10" oninput="updateSettings()">
        </div>

        <button id="sim-btn" class="action-btn" onclick="toggleSimulation()">▶ Test Bridge</button>
        <button class="action-btn clear" onclick="clearBridge()">🗑️ Clear Bridge</button>
        
        <div style="font-size: 0.8rem; color: #94a3b8; margin-top: auto;">
            <strong>Controls:</strong><br>
            - Click & drag from an anchor/node to build.<br>
            - Triangles make the strongest structures!
        </div>
    </div>

    <div id="matter-container"></div>
    <canvas id="draw-canvas"></canvas>

    <script>
        // --- 1. SETUP MATTER.JS ---
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner;
        const Bodies = Matter.Bodies, Composite = Matter.Composite, Constraint = Matter.Constraint;
        const Events = Matter.Events, Vector = Matter.Vector;

        const container = document.getElementById('matter-container');
        const drawCanvas = document.getElementById('draw-canvas');
        const ctx = drawCanvas.getContext('2d');
        
        let width = window.innerWidth - 320; let height = window.innerHeight;
        
        const engine = Engine.create();
        const render = Render.create({
            element: container, engine: engine,
            options: { width, height, wireframes: false, background: '#87CEEB', hasBounds: true }
        });

        Render.run(render);
        const runner = Runner.create(); // Don't run yet, we are in build mode

        // --- 2. GAME STATE & SETTINGS ---
        let mode = 'build'; // 'build' or 'test'
        let currentMaterial = 'wood';
        let blueprint = { nodes: [], links: [] }; // Stores our drawn bridge
        
        let settings = { gravity: 1.0, carWeight: 500, carSpeed: 3, jointMass: 10 };
        const materials = {
            wood: { stiffness: 0.9, color: '#8b5a2b', width: 8, strength: 1.5 },
            steel: { stiffness: 1.0, color: '#94a3b8', width: 6, strength: 3.0 },
            cable: { stiffness: 0.1, color: '#1e293b', width: 3, strength: 0.8 }
        };

        let draggingNode = null; let mouseX = 0; let mouseY = 0;
        let carComposite = null;

        // --- 3. CREATE TERRAIN & ANCHORS ---
        const terrainOpts = { isStatic: true, render: { fillStyle: '#2d8a3e' }, friction: 0.8 };
        const leftCliff = Bodies.rectangle(150, height - 150, 400, 400, terrainOpts);
        const rightCliff = Bodies.rectangle(width - 150, height - 150, 400, 400, terrainOpts);
        const riverOpts = { isStatic: true, isSensor: true, render: { fillStyle: '#3b82f6', opacity: 0.7 } };
        const river = Bodies.rectangle(width/2, height - 50, width, 100, riverOpts);
        
        Composite.add(engine.world, [leftCliff, rightCliff, river]);

        // Create fixed anchor points to build from
        function addAnchor(x, y) {
            blueprint.nodes.push({ x, y, isFixed: true, id: Math.random().toString(36).substr(2, 9) });
        }
        addAnchor(330, height - 360); addAnchor(330, height - 250); // Left anchors
        addAnchor(width - 330, height - 360); addAnchor(width - 330, height - 250); // Right anchors

        // --- 4. BUILD MODE LOGIC (UI & Drawing) ---
        function resize() {
            width = window.innerWidth - 320; height = window.innerHeight;
            render.canvas.width = width; render.canvas.height = height;
            drawCanvas.width = width; drawCanvas.height = height;
        }
        window.addEventListener('resize', resize); resize();

        container.addEventListener('mousedown', (e) => {
            if (mode !== 'build') return;
            const rect = container.getBoundingClientRect();
            const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
            
            // Find closest node
            let closest = null; let minDist = 30; // Snap radius
            blueprint.nodes.forEach(n => {
                const dist = Math.hypot(n.x - mx, n.y - my);
                if (dist < minDist) { minDist = dist; closest = n; }
            });

            if (closest) draggingNode = closest;
        });

        container.addEventListener('mousemove', (e) => {
            if (mode !== 'build') return;
            const rect = container.getBoundingClientRect();
            mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
        });

        container.addEventListener('mouseup', (e) => {
            if (mode !== 'build' || !draggingNode) return;
            
            // Find if we released on another node
            let targetNode = null; let minDist = 30;
            blueprint.nodes.forEach(n => {
                if (n === draggingNode) return;
                const dist = Math.hypot(n.x - mouseX, n.y - mouseY);
                if (dist < minDist) { minDist = dist; targetNode = n; }
            });

            // If no target node, create a new one!
            if (!targetNode) {
                targetNode = { x: mouseX, y: mouseY, isFixed: false, id: Math.random().toString(36).substr(2, 9) };
                blueprint.nodes.push(targetNode);
            }

            // Prevent duplicate links
            const linkExists = blueprint.links.some(l => 
                (l.n1.id === draggingNode.id && l.n2.id === targetNode.id) || 
                (l.n2.id === draggingNode.id && l.n1.id === targetNode.id)
            );

            if (!linkExists) {
                blueprint.links.push({ n1: draggingNode, n2: targetNode, mat: currentMaterial });
            }
            draggingNode = null;
        });

        // Custom Render Loop for Build Mode
        function drawBuildOverlay() {
            ctx.clearRect(0, 0, width, height);
            if (mode !== 'build') return requestAnimationFrame(drawBuildOverlay);

            // Draw Links
            blueprint.links.forEach(link => {
                const matInfo = materials[link.mat];
                ctx.beginPath(); ctx.moveTo(link.n1.x, link.n1.y); ctx.lineTo(link.n2.x, link.n2.y);
                ctx.strokeStyle = matInfo.color; ctx.lineWidth = matInfo.width; ctx.stroke();
            });

            // Draw Dragging Line
            if (draggingNode) {
                ctx.beginPath(); ctx.moveTo(draggingNode.x, draggingNode.y); ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = materials[currentMaterial].color;
                ctx.lineWidth = materials[currentMaterial].width;
                ctx.setLineDash([10, 10]); ctx.stroke(); ctx.setLineDash([]);
            }

            // Draw Nodes
            blueprint.nodes.forEach(n => {
                ctx.beginPath(); ctx.arc(n.x, n.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = n.isFixed ? '#ef4444' : '#38bdf8';
                ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = 'white'; ctx.stroke();
            });

            requestAnimationFrame(drawBuildOverlay);
        }
        drawBuildOverlay();

        // --- 5. SIMULATION MODE (Matter.js Generation) ---
        let simBodies = []; let simConstraints = [];

        function buildPhysicsWorld() {
            // Clear old sim
            Composite.remove(engine.world, [...simBodies, ...simConstraints]);
            if (carComposite) Composite.remove(engine.world, carComposite);
            simBodies = []; simConstraints = [];
            
            engine.gravity.y = settings.gravity;

            // Dictionary to map blueprint node IDs to Matter.js bodies
            const bodyMap = {};

            // 1. Generate Nodes (Joints)
            blueprint.nodes.forEach(n => {
                if (n.isFixed) {
                    const body = Bodies.circle(n.x, n.y, 10, { isStatic: true, render: { fillStyle: '#ef4444' }});
                    bodyMap[n.id] = body; simBodies.push(body);
                } else {
                    const body = Bodies.circle(n.x, n.y, 6, { 
                        mass: settings.jointMass, friction: 0.8,
                        render: { fillStyle: '#38bdf8' }
                    });
                    bodyMap[n.id] = body; simBodies.push(body);
                }
            });

            // 2. Generate Links (Constraints/Springs)
            blueprint.links.forEach(l => {
                const b1 = bodyMap[l.n1.id]; const b2 = bodyMap[l.n2.id];
                const matInfo = materials[l.mat];
                
                const constraint = Constraint.create({
                    bodyA: b1, bodyB: b2, stiffness: matInfo.stiffness, damping: 0.1,
                    render: { strokeStyle: matInfo.color, lineWidth: matInfo.width }
                });
                simConstraints.push(constraint);
            });

            Composite.add(engine.world, [...simBodies, ...simConstraints]);

            // 3. Generate The Test Car
            carComposite = Composite.create();
            const chassis = Bodies.rectangle(100, height - 390, 80, 30, { 
                mass: settings.carWeight, render: { fillStyle: '#ef4444' }, collisionFilter: { group: -1 }
            });
            const wheelOpts = { friction: 0.9, restitution: 0.1, render: { fillStyle: '#111' }, collisionFilter: { group: -1 }};
            const wheelA = Bodies.circle(70, height - 370, 15, wheelOpts);
            const wheelB = Bodies.circle(130, height - 370, 15, wheelOpts);
            
            const axelA = Constraint.create({ bodyA: chassis, pointA: {x: -30, y: 15}, bodyB: wheelA, stiffness: 0.2, length: 5, render:{visible:false} });
            const axelB = Constraint.create({ bodyA: chassis, pointA: {x: 30, y: 15}, bodyB: wheelB, stiffness: 0.2, length: 5, render:{visible:false} });
            
            Composite.add(carComposite, [chassis, wheelA, wheelB, axelA, axelB]);
            Composite.add(engine.world, carComposite);
        }

        // Apply car driving force during simulation
        Events.on(engine, 'beforeUpdate', () => {
            if (mode === 'test' && carComposite) {
                const chassis = carComposite.bodies[0];
                if (chassis.position.x < width - 150) {
                    // Push car right
                    Matter.Body.setVelocity(chassis, { x: settings.carSpeed, y: chassis.velocity.y });
                }
            }
        });

        // --- 6. UI CONTROLS ---
        function updateSettings() {
            settings.gravity = parseFloat(document.getElementById('gravity').value);
            settings.carWeight = parseInt(document.getElementById('car-weight').value);
            settings.carSpeed = parseFloat(document.getElementById('car-speed').value);
            settings.jointMass = parseInt(document.getElementById('joint-mass').value);
            
            document.getElementById('grav-val').innerText = settings.gravity;
            document.getElementById('car-val').innerText = settings.carWeight;
            document.getElementById('speed-val').innerText = settings.carSpeed;
            document.getElementById('joint-val').innerText = settings.jointMass;
        }

        window.setMaterial = function(mat, btn) {
            currentMaterial = mat;
            document.querySelectorAll('.material-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        window.toggleSimulation = function() {
            const btn = document.getElementById('sim-btn');
            const status = document.getElementById('status');
            
            if (mode === 'build') {
                mode = 'test';
                btn.innerHTML = '🛑 Stop & Edit'; btn.classList.add('stop');
                status.innerHTML = 'MODE: SIMULATING'; status.style.color = '#4ade80'; status.style.borderColor = '#4ade80';
                
                buildPhysicsWorld();
                Runner.run(runner, engine); // Start physics
            } else {
                mode = 'build';
                btn.innerHTML = '▶ Test Bridge'; btn.classList.remove('stop');
                status.innerHTML = 'MODE: BUILDING'; status.style.color = '#fbbf24'; status.style.borderColor = '#fbbf24';
                
                Runner.stop(runner); // Pause physics
                // Clear the simulation bodies so the overlay can draw the blueprint again
                Composite.remove(engine.world, [...simBodies, ...simConstraints]);
                if (carComposite) Composite.remove(engine.world, carComposite);
            }
        }

        window.clearBridge = function() {
            if (mode === 'test') toggleSimulation();
            blueprint.nodes = blueprint.nodes.filter(n => n.isFixed); // Keep anchors
            blueprint.links = [];
        }

    </script>
</body>
</html>
